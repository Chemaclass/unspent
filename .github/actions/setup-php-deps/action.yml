name: Setup PHP with dependencies
description: Set up PHP, cache Composer, and install project dependencies

inputs:
  php-version:
    description: PHP version to set up
    required: true
  coverage:
    description: Coverage driver for setup-php (none, pcov, xdebug)
    required: false
    default: none

runs:
  using: composite
  steps:
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ inputs.php-version }}
        coverage: ${{ inputs.coverage }}

    - name: Get Composer cache directory
      id: composer-cache
      shell: bash
      run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

    - name: Cache Composer dependencies
      uses: actions/cache@v4
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: composer-${{ inputs.php-version }}-${{ hashFiles('composer.lock') }}
        restore-keys: composer-${{ inputs.php-version }}-

    - name: Install dependencies
      shell: bash
      run: composer install --prefer-dist --no-progress --no-interaction
