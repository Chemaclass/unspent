name: Release

# Publishes a GitHub Release whenever a version tag is pushed.
# Release notes come straight from CHANGELOG.md, so the release and the
# changelog can never drift. Cut releases with: tools/release.sh <version>

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        run: bash tools/changelog-extract.sh "${{ steps.version.outputs.version }}" > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prerelease=""
          case "${{ steps.version.outputs.version }}" in
            *-*) prerelease="--prerelease" ;;  # 1.2.0-rc1, 1.2.0-beta, ...
          esac
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            --verify-tag \
            $prerelease
