name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Kept in sync with composer.json (infection) and the CONTRIBUTING / CLAUDE quality tables.
  MIN_COVERAGE: 85
  MIN_MSI: 90

jobs:
  security:
    name: Security Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Check for security vulnerabilities
        uses: symfonycorp/security-checker-action@v5

  lint:
    name: PHP-CS-Fixer
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: php-cs-fixer
          coverage: none

      - name: Cache PHP-CS-Fixer
        uses: actions/cache@v4
        with:
          path: .php-cs-fixer.cache
          key: php-cs-fixer-${{ hashFiles('**/*.php') }}
          restore-keys: php-cs-fixer-

      - name: Run PHP-CS-Fixer
        run: php-cs-fixer fix --dry-run --diff

  rector:
    name: Rector
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-php-deps
        with:
          php-version: '8.4'

      - name: Cache Rector
        uses: actions/cache@v4
        with:
          path: .rector-cache
          key: rector-${{ hashFiles('**/*.php') }}
          restore-keys: rector-

      - name: Run Rector
        run: vendor/bin/rector --dry-run

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-php-deps
        with:
          php-version: ${{ matrix.php }}

      - name: Cache PHPStan
        uses: actions/cache@v4
        with:
          path: .phpstan-cache
          key: phpstan-${{ matrix.php }}-${{ hashFiles('**/*.php') }}
          restore-keys: phpstan-${{ matrix.php }}-

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=512M

  tests:
    name: PHPUnit
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-php-deps
        with:
          php-version: ${{ matrix.php }}
          coverage: pcov

      - name: Run tests with coverage
        run: vendor/bin/phpunit --coverage-text --coverage-clover=coverage.xml

      - name: Check coverage threshold
        run: |
          COVERAGE=$(php -r "
            \$xml = simplexml_load_file('coverage.xml');
            \$metrics = \$xml->project->metrics;
            \$statements = (int)\$metrics['statements'];
            \$covered = (int)\$metrics['coveredstatements'];
            echo \$statements > 0 ? round((\$covered / \$statements) * 100, 2) : 0;
          ")
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < ${{ env.MIN_COVERAGE }}" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below minimum threshold of ${{ env.MIN_COVERAGE }}%"
            exit 1
          fi

  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-php-deps
        with:
          php-version: '8.4'
          coverage: pcov

      - name: Cache Infection
        uses: actions/cache@v4
        with:
          path: .infection-cache
          key: infection-${{ hashFiles('**/*.php') }}
          restore-keys: infection-

      - name: Run Infection
        run: vendor/bin/infection --min-msi=${{ env.MIN_MSI }} --min-covered-msi=${{ env.MIN_MSI }} --threads=4 --logger-github
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
